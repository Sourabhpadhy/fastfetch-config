$mainMod = SUPER

# --- Protect Core Apps ---
unbind = $mainMod, Q
bind = $mainMod, Q, exec, kitty
unbind = $mainMod, E
bind = $mainMod, E, exec, nautilus
unbind = $mainMod, C
bind = $mainMod, C, killactive
unbind = $mainMod, V
bind = $mainMod, V, togglefloating

# --- ii Shell Matched Keybinds ---
# Search (R) and Tab/Overview (A)
unbind = $mainMod, R
unbind = $mainMod, A
unbind = $mainMod, Space
bind = $mainMod, R, global, quickshell:searchToggleRelease
bind = $mainMod, A, global, quickshell:overviewToggleRelease
#bind = $mainMod, A, exec, qs ipc -c overview call overview toggle

# Wallpaper Switch (X)
unbind = CTRL $mainMod, T
unbind = $mainMod, X
bind = $mainMod, X, exec, qs ipc -c wallpaperSelector call wallpaperSelector toggle

# Settings (I) and Power (M)
unbind = $mainMod, I
unbind = $mainMod, M
bind = $mainMod, I, exec, qs ipc -c settings call settings toggle
bind = $mainMod, M, exec, qs ipc -c powermenu call powermenu toggle

# Lock (L) and Clipboard (Shift+V)
unbind = $mainMod, L
unbind = $mainMod SHIFT, V
bind = $mainMod, L, exec, loginctl lock-session
bind = $mainMod SHIFT, V, exec, cliphist list | wofi -dmenu | cliphist decode | wl-copy

# --- Protect Scrolling Layout Keys ---
unbind = $mainMod, comma
unbind = $mainMod, period
unbind = $mainMod SHIFT, comma
unbind = $mainMod SHIFT, period
unbind = $mainMod, F
unbind = $mainMod SHIFT, H
unbind = $mainMod SHIFT, V

bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
bind = $mainMod SHIFT, period, layoutmsg, swapcol r
bind = $mainMod SHIFT, comma, layoutmsg, swapcol l
bind = $mainMod, F, layoutmsg, fit active
bind = $mainMod SHIFT, H, exec, hyprctl keyword scrolling:direction right
bind = $mainMod SHIFT, V, exec, hyprctl keyword scrolling:direction down   
