# ==========================================
# CUSTOM KEYBINDS SHIELD (Overrides ii defaults)
# ==========================================
$mainMod = SUPER

# --- 1. Protect Your Core Apps & Window Management ---
# Unbind ii's default app shortcuts
unbind = $mainMod, Q
unbind = $mainMod, E
unbind = $mainMod, C
unbind = $mainMod, V

# Bind back to your base hyprland.conf choices
bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, exec, nautilus
bind = $mainMod, C, killactive
bind = $mainMod, V, togglefloating


# --- 2. Map ii Shell Features to Your Keys ---
# Unbind ii's default workspace and search binds
unbind = $mainMod, A
unbind = $mainMod, R
unbind = $mainMod, Space

# Map the Quickshell launcher/overview to your preferred keys
bind = $mainMod, A, exec, qs ipc -c overview call overview toggle
bind = $mainMod, R, exec, qs ipc -c overview call overview toggle


# --- 3. Protect Your Scrolling Layout Keys ---
# ii's dwindle keys might interfere with these, so we unbind them 
# just in case and re-establish your scrolling rules.
unbind = $mainMod, comma
unbind = $mainMod, period
unbind = $mainMod SHIFT, comma
unbind = $mainMod SHIFT, period
unbind = $mainMod, F
unbind = $mainMod SHIFT, H
unbind = $mainMod SHIFT, V

bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
bind = $mainMod SHIFT, period, layoutmsg, swapcol r
bind = $mainMod SHIFT, comma, layoutmsg, swapcol l
bind = $mainMod, F, layoutmsg, fit active
bind = $mainMod SHIFT, H, exec, hyprctl keyword scrolling:direction right
bind = $mainMod SHIFT, V, exec, hyprctl keyword scrolling:direction down
